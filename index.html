<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>釣りコンシェルジュ</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="釣りコンシェルジュ">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body{
    font-family:sans-serif;
    margin:20px;
}

select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
}

#result{
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
}
</style>

</head>

<body>

<h1>🎣 釣りコンシェルジュ</h1>

<label>魚種</label><select id="fish"><option>クイーンフィッシュ</option><option>GT</option><option>バラマンディ</option><option>ターポン</option><option>ピーコックバス</option></select>

<label>場所</label><select id="location"><option>Marina South Pier</option><option>Bedok Jetty</option><option>Tuas</option></select>

<label>釣り方</label><select id="style"><option>岸釣り</option><option>船釣り</option></select>

<label>時間帯</label><select id="time"><option>朝マヅメ</option><option>日中</option><option>夕マヅメ</option><option>夜</option></select>

<button onclick="search()">おすすめ表示</button>

<div id="result"></div>

<script>

const tackleData = {

"クイーンフィッシュ":{
    rod:"9〜10ft M",
    reel:"4000番",
    line:"PE1〜1.5号",
    leader:"30〜40lb",

    strategy:{
        "Marina South Pier":{
            "朝マヅメ":"潮目を高速巻き。表層優先。",
            "日中":"20〜30gジグで中層。",
            "夕マヅメ":"シンキングペンシルで表層。",
            "夜":"常夜灯周りをスロー。"
        },
        "Bedok Jetty":{
            "朝マヅメ":"先端から遠投。",
            "日中":"ジグで広く探る。",
            "夕マヅメ":"ナブラ待ち。",
            "夜":"中層を一定速度。"
        },
        "Tuas":{
            "朝マヅメ":"潮流のヨレ狙い。",
            "日中":"ボトムから中層。",
            "夕マヅメ":"トップ優先。",
            "夜":"常夜灯周辺。"
        }
    }
},

"GT":{
    rod:"9〜10ft MH〜H",
    reel:"5000〜8000番",
    line:"PE2〜4号",
    leader:"50〜80lb",

    strategy:{
        "Marina South Pier":{
            "朝マヅメ":"大型ポッパー中心。",
            "日中":"40gジグ速巻き。",
            "夕マヅメ":"トップ優先。",
            "夜":"大型ミノー。"
        },
        "Bedok Jetty":{
            "朝マヅメ":"潮目を遠投。",
            "日中":"中層ジャーク。",
            "夕マヅメ":"トップ。",
            "夜":"大型ミノー。"
        },
        "Tuas":{
            "朝マヅメ":"大型ポッパー。",
            "日中":"ジグで回遊待ち。",
            "夕マヅメ":"トップ。",
            "夜":"大型ミノー。"
        }
    }
},

"バラマンディ":{
    rod:"8〜9ft M",
    reel:"3000〜4000番",
    line:"PE1〜1.5号",
    leader:"25〜40lb",

    strategy:{
        "Marina South Pier":{
            "朝マヅメ":"ミノーで表層。",
            "日中":"橋脚周り。",
            "夕マヅメ":"ジャーク主体。",
            "夜":"常夜灯狙い。"
        },
        "Bedok Jetty":{
            "朝マヅメ":"ミノー。",
            "日中":"ストラクチャー周り。",
            "夕マヅメ":"シンキングペンシル。",
            "夜":"スローリトリーブ。"
        },
        "Tuas":{
            "朝マヅメ":"表層攻略。",
            "日中":"中層中心。",
            "夕マヅメ":"ミノー。",
            "夜":"常夜灯。"
        }
    }
},

"ターポン":{
    rod:"7〜8ft ML",
    reel:"2500〜3000番",
    line:"PE0.8〜1号",
    leader:"20〜30lb",

    strategy:{
        "Marina South Pier":{
            "朝マヅメ":"小型ミノー。",
            "日中":"ワーム中心。",
            "夕マヅメ":"表層攻略。",
            "夜":"常夜灯周辺。"
        },
        "Bedok Jetty":{
            "朝マヅメ":"小型プラグ。",
            "日中":"中層。",
            "夕マヅメ":"トップ。",
            "夜":"ライトゲーム。"
        },
        "Tuas":{
            "朝マヅメ":"ワーム。",
            "日中":"中層。",
            "夕マヅメ":"小型ミノー。",
            "夜":"常夜灯。"
        }
    }
},

"ピーコックバス":{
    rod:"6〜7ft ML",
    reel:"2500番",
    line:"PE1号",
    leader:"20lb",

    strategy:{
        "Marina South Pier":{
            "朝マヅメ":"対象外",
            "日中":"対象外",
            "夕マヅメ":"対象外",
            "夜":"対象外"
        },
        "Bedok Jetty":{
            "朝マヅメ":"対象外",
            "日中":"対象外",
            "夕マヅメ":"対象外",
            "夜":"対象外"
        },
        "Tuas":{
            "朝マヅメ":"対象外",
            "日中":"対象外",
            "夕マヅメ":"対象外",
            "夜":"対象外"
        }
    }
}

};

function search(){

    const fish = document.getElementById("fish").value;
    const location = document.getElementById("location").value;
    const time = document.getElementById("time").value;

    const data = tackleData[fish];

    document.getElementById("result").innerHTML = `
        <h2>${fish}</h2>

        <p><b>ロッド</b><br>${data.rod}</p>

        <p><b>リール</b><br>${data.reel}</p>

        <p><b>PE</b><br>${data.line}</p>

        <p><b>リーダー</b><br>${data.leader}</p>

        <p><b>攻略法</b><br>
        ${data.strategy[location][time]}
        </p>
    `;
}

</script>

</body>
</html>
